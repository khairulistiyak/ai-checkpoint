name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Check shell scripts
        run: shellcheck setup.sh install.sh l
      - name: Check CLI syntax
        run: node -c scripts/ledger.cjs
