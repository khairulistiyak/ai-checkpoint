<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif">
  <defs>
    <!-- Backgrounds -->
    <rect id="bg" width="1200" height="900" fill="#09090b" />
    
    <!-- Gradients -->
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#0f0f12" />
    </linearGradient>

    <!-- UI Elements -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.8" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { fill: #ffffff; }
    .text-muted { fill: #a1a1aa; }
    .text-sub { fill: #71717a; }
    
    .font-mono { font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
    .font-bold { font-weight: 600; }
    .font-black { font-weight: 800; letter-spacing: -1px; }
    
    .bento-card { fill: url(#cardGrad); stroke: #27272a; stroke-width: 1.5; rx: 24; ry: 24; }
    .bento-badge { fill: #27272a; rx: 12; ry: 12; }
    
    .step-box { fill: #09090b; stroke: #27272a; stroke-width: 1; rx: 12; ry: 12; }
  </style>

  <!-- Base -->
  <use href="#bg" />
  
  <!-- Subtle Background Grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />
  </pattern>
  <rect width="1200" height="900" fill="url(#grid)" />

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- HEADER -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g transform="translate(40, 50)">
    <rect width="120" height="28" class="bento-badge" />
    <text x="60" y="19" text-anchor="middle" font-size="12" class="font-bold text-muted" letter-spacing="1">ARCHITECTURE</text>
    <text x="0" y="60" font-size="36" class="font-black">ai-checkpoint // Autonomous Flow</text>
    <text x="0" y="84" font-size="16" class="text-muted">A clear, foolproof system ensuring small AI models write perfect code without hallucinations.</text>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- BOX 1: HUMAN CONTEXT -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g transform="translate(40, 160)" filter="url(#shadow)">
    <rect width="550" height="200" class="bento-card" />
    
    <!-- Top left icon/title -->
    <rect x="24" y="24" width="40" height="40" rx="10" fill="url(#blueGlow)" fill-opacity="0.1" stroke="url(#blueGlow)" stroke-opacity="0.5" />
    <text x="44" y="49" text-anchor="middle" font-size="20">👤</text>
    <text x="80" y="50" font-size="20" class="font-bold">1. Human Input (The Plan)</text>
    
    <text x="24" y="90" font-size="14" class="text-muted">The user writes a detailed, atomic step-by-step plan.</text>
    
    <!-- File visualization -->
    <rect x="24" y="110" width="502" height="66" rx="8" fill="#09090b" stroke="#27272a" />
    <text x="40" y="132" font-size="13" class="font-mono text-sub">plan/auth-feature.md</text>
    <text x="40" y="152" font-size="13" class="font-mono text-muted">Step 1.1: Create src/auth/login.ts (Add validation)</text>
    <text x="40" y="168" font-size="13" class="font-mono text-muted">Step 1.2: Create src/auth/api.ts (Handle JWT)</text>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- BOX 2: SYSTEM STATE -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g transform="translate(610, 160)" filter="url(#shadow)">
    <rect width="550" height="200" class="bento-card" />
    
    <!-- Top left icon/title -->
    <rect x="24" y="24" width="40" height="40" rx="10" fill="url(#purpleGlow)" fill-opacity="0.1" stroke="url(#purpleGlow)" stroke-opacity="0.5" />
    <text x="44" y="49" text-anchor="middle" font-size="20">📊</text>
    <text x="80" y="50" font-size="20" class="font-bold">2. System State (The Tracker)</text>
    
    <text x="24" y="90" font-size="14" class="text-muted">The CLI automatically tracks which step the AI is currently on.</text>
    
    <!-- File visualization -->
    <rect x="24" y="110" width="502" height="66" rx="8" fill="#09090b" stroke="#27272a" />
    <text x="40" y="132" font-size="13" class="font-mono text-sub">.agents/PROGRESS.md</text>
    <text x="40" y="152" font-size="13" class="font-mono text-success">✓ [DONE] Step 1.1</text>
    <text x="40" y="168" font-size="13" class="font-mono" fill="#a855f7">👉 [NEXT] Step 1.2</text>
  </g>

  <!-- Connecting Lines from Box 1 & 2 down to Box 3 -->
  <path d="M 315 360 L 315 380" stroke="#71717a" stroke-width="2" marker-end="url(#arrowRight)" />
  <path d="M 885 360 L 885 380" stroke="#71717a" stroke-width="2" marker-end="url(#arrowRight)" />

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- BOX 3: THE AI LOOP (THE ENGINE) -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g transform="translate(40, 390)" filter="url(#shadow)">
    <rect width="1120" height="260" class="bento-card" />
    
    <!-- Central Icon -->
    <rect x="520" y="24" width="80" height="32" rx="16" fill="#27272a" />
    <text x="560" y="45" text-anchor="middle" font-size="14" class="font-bold">3. AI ENGINE</text>

    <!-- The 4-step execution flow -->
    <!-- Step A -->
    <g transform="translate(40, 80)">
      <rect width="220" height="140" class="step-box" />
      <circle cx="110" cy="40" r="20" fill="#27272a" />
      <text x="110" y="45" text-anchor="middle" font-size="14">👀</text>
      <text x="110" y="80" text-anchor="middle" font-size="16" class="font-bold">Read State</text>
      <text x="110" y="100" text-anchor="middle" font-size="12" class="text-muted">AI reads PROGRESS</text>
      <text x="110" y="116" text-anchor="middle" font-size="12" class="text-muted">and finds NEXT step</text>
    </g>

    <path d="M 270 150 L 310 150" stroke="#71717a" stroke-width="2" marker-end="url(#arrowRight)" />

    <!-- Step B -->
    <g transform="translate(320, 80)">
      <rect width="220" height="140" class="step-box" />
      <rect width="220" height="140" fill="url(#blueGlow)" fill-opacity="0.05" rx="12" />
      <circle cx="110" cy="40" r="20" fill="#27272a" />
      <text x="110" y="45" text-anchor="middle" font-size="14">⚡</text>
      <text x="110" y="80" text-anchor="middle" font-size="16" class="font-bold" fill="#60a5fa">./l start X.Y</text>
      <text x="110" y="100" text-anchor="middle" font-size="12" class="text-muted">Initializes file creation</text>
      <text x="110" y="116" text-anchor="middle" font-size="12" class="text-muted">Locks step status</text>
    </g>

    <path d="M 550 150 L 590 150" stroke="#71717a" stroke-width="2" marker-end="url(#arrowRight)" />

    <!-- Step C -->
    <g transform="translate(600, 80)">
      <rect width="220" height="140" class="step-box" />
      <circle cx="110" cy="40" r="20" fill="#27272a" />
      <text x="110" y="45" text-anchor="middle" font-size="14">✍️</text>
      <text x="110" y="80" text-anchor="middle" font-size="16" class="font-bold">Write Code</text>
      <text x="110" y="100" text-anchor="middle" font-size="12" class="text-muted">AI modifies exactly</text>
      <text x="110" y="116" text-anchor="middle" font-size="12" class="text-muted">one single file</text>
    </g>

    <path d="M 830 150 L 870 150" stroke="#71717a" stroke-width="2" marker-end="url(#arrowRight)" />

    <!-- Step D -->
    <g transform="translate(880, 80)">
      <rect width="200" height="140" class="step-box" />
      <rect width="200" height="140" fill="url(#greenGlow)" fill-opacity="0.05" rx="12" />
      <circle cx="100" cy="40" r="20" fill="#27272a" />
      <text x="100" y="45" text-anchor="middle" font-size="14">✅</text>
      <text x="100" y="80" text-anchor="middle" font-size="16" class="font-bold" fill="#34d399">./l c X.Y</text>
      <text x="100" y="100" text-anchor="middle" font-size="12" class="text-muted">Auto-verifies file exists</text>
      <text x="100" y="116" text-anchor="middle" font-size="12" class="text-muted">Advances to NEXT step</text>
    </g>
    
    <!-- Loop Back Line -->
    <path d="M 980 220 L 980 240 L 150 240 L 150 220" fill="none" stroke="#71717a" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowRight)" />
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- BOX 4: CONSTRAINTS -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g transform="translate(40, 670)" filter="url(#shadow)">
    <rect width="550" height="180" class="bento-card" />
    
    <text x="30" y="45" font-size="18" class="font-bold">4. Strict Constraints</text>
    
    <g transform="translate(30, 75)">
      <!-- Rule 1 -->
      <rect y="0" width="230" height="80" rx="12" fill="#09090b" stroke="#27272a" />
      <text x="16" y="30" font-size="16" class="font-bold">1 Step = 1 File</text>
      <text x="16" y="50" font-size="12" class="text-muted">Prevents context overload</text>
      <text x="16" y="66" font-size="12" class="text-muted">and hallucinations.</text>
      
      <!-- Rule 2 -->
      <rect x="250" y="0" width="240" height="80" rx="12" fill="#09090b" stroke="#27272a" />
      <text x="266" y="30" font-size="16" class="font-bold">Atomic Verification</text>
      <text x="266" y="50" font-size="12" class="text-muted">CLI enforces success before</text>
      <text x="266" y="66" font-size="12" class="text-muted">allowing the next step.</text>
    </g>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- BOX 5: PERFECT OUTPUT -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g transform="translate(610, 670)" filter="url(#shadow)">
    <rect width="550" height="180" class="bento-card" />
    <rect width="550" height="180" class="bento-card" fill="url(#greenGlow)" fill-opacity="0.02" stroke="url(#greenGlow)" stroke-opacity="0.3" filter="url(#glow)"/>
    <rect width="550" height="180" class="bento-card" fill="transparent" />
    
    <text x="30" y="45" font-size="18" class="font-bold" fill="#34d399">5. The Result: Bug-Free Code</text>
    
    <!-- Code snippet block -->
    <g transform="translate(30, 75)">
      <rect width="490" height="80" rx="12" fill="#09090b" stroke="#27272a" />
      <!-- Mac Dots -->
      <circle cx="16" cy="16" r="4" fill="#ef4444" />
      <circle cx="28" cy="16" r="4" fill="#eab308" />
      <circle cx="40" cy="16" r="4" fill="#22c55e" />
      
      <text x="60" y="20" font-size="12" class="font-mono text-sub">src/auth/api.ts (Max 150 lines)</text>
      
      <text x="16" y="46" font-size="12" class="font-mono" fill="#c4b5fd">export function</text>
      <text x="126" y="46" font-size="12" class="font-mono" fill="#60a5fa">handleLogin</text>
      <text x="204" y="46" font-size="12" class="font-mono text-muted">(req, res) {</text>
      
      <text x="32" y="66" font-size="12" class="font-mono" fill="#34d399">// 100% focused, atomic, and verified.</text>
    </g>
  </g>
  
</svg>
