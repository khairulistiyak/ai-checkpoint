<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif">
  <defs>
    <!-- Dark base background -->
    <rect id="bg" width="1400" height="900" fill="#090514" />
    
    <!-- Colorful Mesh Gradient Orbs -->
    <filter id="extremeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="100" />
    </filter>
    
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Vibrant Gradients -->
    <linearGradient id="gradPinkOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0080" />
      <stop offset="100%" stop-color="#ff8c00" />
    </linearGradient>
    
    <linearGradient id="gradCyanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="gradPurplePink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b224ef" />
      <stop offset="100%" stop-color="#7579ff" />
    </linearGradient>

    <linearGradient id="glassFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <!-- Chart Gradient -->
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    text { fill: #ffffff; }
    .text-sub { fill: rgba(255, 255, 255, 0.6); }
    .font-bold { font-weight: 700; }
    .font-black { font-weight: 900; letter-spacing: -1px; }
    
    .glass-card { 
      fill: url(#glassFill); 
      stroke: rgba(255, 255, 255, 0.15); 
      stroke-width: 1.5; 
      rx: 24; ry: 24; 
    }
    
    .glass-pill { 
      fill: rgba(255, 255, 255, 0.1); 
      stroke: rgba(255, 255, 255, 0.2); 
      rx: 999; ry: 999; 
    }
  </style>

  <!-- 1. Background & Mesh Gradient -->
  <use href="#bg" />
  <g filter="url(#extremeBlur)" opacity="0.6">
    <circle cx="300" cy="200" r="300" fill="#ff0080" />
    <circle cx="1100" cy="300" r="350" fill="#00f2fe" />
    <circle cx="700" cy="800" r="400" fill="#b224ef" />
  </g>

  <!-- Subtle noise/grid over background -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.05" />
  </pattern>
  <rect width="1400" height="900" fill="url(#grid)" />

  <!-- 2. Main App Window (Glassmorphism) -->
  <g transform="translate(40, 40)">
    <!-- Main glass container -->
    <rect width="1320" height="820" class="glass-card" />
    <!-- Window controls -->
    <circle cx="30" cy="30" r="7" fill="#ff5f56" />
    <circle cx="55" cy="30" r="7" fill="#ffbd2e" />
    <circle cx="80" cy="30" r="7" fill="#27c93f" />

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- SIDEBAR -->
    <!-- ══════════════════════════════════════════════════════ -->
    <g transform="translate(0, 70)">
      <line x1="260" y1="0" x2="260" y2="750" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
      
      <!-- Brand -->
      <text x="30" y="30" font-size="24" class="font-black">ai-checkpoint</text>
      
      <!-- Colored Badge -->
      <rect x="30" y="50" width="80" height="24" rx="12" fill="url(#gradCyanBlue)" />
      <text x="70" y="66" font-size="11" class="font-bold" text-anchor="middle">PRO MODE</text>

      <g transform="translate(30, 120)">
        <text x="0" y="0" font-size="12" class="font-bold text-sub" letter-spacing="1">DASHBOARDS</text>
        
        <!-- Active Nav -->
        <rect x="-10" y="16" width="220" height="48" rx="12" fill="rgba(255,255,255,0.1)" />
        <rect x="-10" y="26" width="4" height="28" rx="2" fill="url(#gradCyanBlue)" />
        <text x="20" y="46" font-size="16" class="font-bold">Command Center</text>
        
        <text x="20" y="96" font-size="16" class="font-bold text-sub">Agent Config</text>
        <text x="20" y="146" font-size="16" class="font-bold text-sub">System Logs</text>
        <text x="20" y="196" font-size="16" class="font-bold text-sub">Analytics</text>
      </g>
    </g>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- MAIN CONTENT AREA -->
    <!-- ══════════════════════════════════════════════════════ -->
    <g transform="translate(260, 70)">
      
      <!-- TOP HEADER -->
      <g transform="translate(50, 20)">
        <text y="20" font-size="36" class="font-black">Command Center</text>
        <text y="46" font-size="16" class="text-sub">Real-time autonomous AI execution overview.</text>
        
        <!-- Profile / Search Right side -->
        <rect x="740" y="-10" width="240" height="48" class="glass-pill" />
        <text x="760" y="19" font-size="14" class="text-sub">Search commands...</text>
      </g>

      <!-- 3 VIBRANT STATS CARDS -->
      <g transform="translate(50, 100)">
        <!-- Pink/Orange Card -->
        <g>
          <rect width="300" height="140" rx="24" fill="url(#gradPinkOrange)" />
          <text x="24" y="40" font-size="14" class="font-bold" fill="rgba(255,255,255,0.9)">Total Steps Executed</text>
          <text x="24" y="90" font-size="48" class="font-black">1,402</text>
          <rect x="24" y="105" width="80" height="20" rx="10" fill="rgba(255,255,255,0.2)" />
          <text x="64" y="119" font-size="11" class="font-bold" text-anchor="middle">+12% today</text>
        </g>

        <!-- Cyan/Blue Card -->
        <g transform="translate(330, 0)">
          <rect width="300" height="140" rx="24" fill="url(#gradCyanBlue)" />
          <text x="24" y="40" font-size="14" class="font-bold" fill="rgba(255,255,255,0.9)">System Accuracy</text>
          <text x="24" y="90" font-size="48" class="font-black">99.8%</text>
          <rect x="24" y="105" width="80" height="20" rx="10" fill="rgba(255,255,255,0.2)" />
          <text x="64" y="119" font-size="11" class="font-bold" text-anchor="middle">Zero Bugs</text>
        </g>

        <!-- Purple/Pink Card -->
        <g transform="translate(660, 0)">
          <rect width="330" height="140" rx="24" fill="url(#gradPurplePink)" />
          <text x="24" y="40" font-size="14" class="font-bold" fill="rgba(255,255,255,0.9)">Current AI Agent</text>
          <text x="24" y="90" font-size="32" class="font-black">Gemini 3.1 Pro</text>
          <rect x="24" y="105" width="80" height="20" rx="10" fill="rgba(255,255,255,0.2)" />
          <text x="64" y="119" font-size="11" class="font-bold" text-anchor="middle">Active</text>
        </g>
      </g>

      <!-- BOTTOM AREA: CHART & TERMINAL -->
      <g transform="translate(50, 270)">
        
        <!-- LARGE ACTIVITY CHART -->
        <g>
          <rect width="630" height="450" class="glass-card" />
          <text x="30" y="40" font-size="20" class="font-bold">Velocity Chart</text>
          
          <!-- Chart Grid Lines -->
          <line x1="30" y1="120" x2="600" y2="120" stroke="rgba(255,255,255,0.1)" stroke-dasharray="6" />
          <line x1="30" y1="220" x2="600" y2="220" stroke="rgba(255,255,255,0.1)" stroke-dasharray="6" />
          <line x1="30" y1="320" x2="600" y2="320" stroke="rgba(255,255,255,0.1)" stroke-dasharray="6" />
          
          <!-- Smooth Curved Area Chart -->
          <path d="M 30 380 C 100 380, 150 250, 220 280 C 300 310, 350 150, 420 120 C 500 90, 550 220, 600 180 L 600 420 L 30 420 Z" fill="url(#chartGrad)" />
          <!-- Chart Line -->
          <path d="M 30 380 C 100 380, 150 250, 220 280 C 300 310, 350 150, 420 120 C 500 90, 550 220, 600 180" fill="none" stroke="#00f2fe" stroke-width="4" stroke-linecap="round" />
          
          <!-- Glowing Data Point -->
          <circle cx="420" cy="120" r="8" fill="#ffffff" stroke="#00f2fe" stroke-width="4" />
          <rect x="380" y="70" width="80" height="30" class="glass-pill" />
          <text x="420" y="90" font-size="12" class="font-bold" text-anchor="middle">Peak Rate</text>
        </g>

        <!-- LIVE TASK TRACKER -->
        <g transform="translate(660, 0)">
          <rect width="330" height="450" class="glass-card" />
          <text x="24" y="40" font-size="20" class="font-bold">Live Execution Queue</text>
          
          <g transform="translate(24, 70)">
            <!-- Task 1 (Done) -->
            <rect width="282" height="64" rx="16" fill="rgba(255,255,255,0.05)" />
            <circle cx="32" cy="32" r="12" fill="#10b981" />
            <path d="M 27 32 L 30 35 L 37 28" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
            <text x="56" y="28" font-size="14" class="font-bold">Compile Kernel</text>
            <text x="56" y="46" font-size="12" class="text-sub">Completed in 1.2s</text>

            <!-- Task 2 (Running) -->
            <rect y="80" width="282" height="64" rx="16" fill="rgba(255,255,255,0.1)" stroke="url(#gradPurplePink)" stroke-width="1.5" />
            <circle cx="32" cy="112" r="12" fill="url(#gradPurplePink)" />
            <text x="56" y="108" font-size="14" class="font-bold">Build React Components</text>
            <text x="56" y="126" font-size="12" class="text-sub">Executing Step 1.3...</text>
            <rect x="210" y="104" width="60" height="20" rx="10" fill="url(#gradPurplePink)" />
            <text x="240" y="118" font-size="10" class="font-bold" text-anchor="middle">RUNNING</text>

            <!-- Task 3 (Pending) -->
            <rect y="160" width="282" height="64" rx="16" fill="rgba(255,255,255,0.05)" />
            <circle cx="32" cy="192" r="12" fill="transparent" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
            <text x="56" y="188" font-size="14" class="font-bold text-sub">Database Migrations</text>
            <text x="56" y="206" font-size="12" class="text-sub">Queued</text>
            
            <!-- Task 4 (Pending) -->
            <rect y="240" width="282" height="64" rx="16" fill="rgba(255,255,255,0.05)" />
            <circle cx="32" cy="272" r="12" fill="transparent" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
            <text x="56" y="268" font-size="14" class="font-bold text-sub">Deploy to Production</text>
            <text x="56" y="286" font-size="12" class="text-sub">Queued</text>
          </g>
        </g>

      </g>
    </g>
  </g>
</svg>
