<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif">
  <defs>
    <!-- Backgrounds -->
    <rect id="bg" width="1400" height="900" fill="#000000" />
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    
    <linearGradient id="primaryGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Simple, universally supported shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Clean typography without animations that break renderers */
    text { fill: #ffffff; }
    .text-muted { fill: #a1a1aa; }
    .text-primary { fill: #8b5cf6; }
    .text-success { fill: #10b981; }
    
    .font-mono { font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace; }
    .font-bold { font-weight: 600; }
    .font-black { font-weight: 800; letter-spacing: -0.5px; }
  </style>

  <!-- Base -->
  <use href="#bg" />
  
  <!-- Subtle Grid Pattern in background -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
  </pattern>
  <rect width="1400" height="900" fill="url(#grid)" />

  <!-- APP CONTAINER -->
  <g transform="translate(40, 40)" filter="url(#shadow)">
    <!-- App Outline -->
    <rect width="1320" height="820" rx="20" fill="#000000" stroke="#333333" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="28" cy="28" r="6" fill="#ef4444" />
    <circle cx="48" cy="28" r="6" fill="#eab308" />
    <circle cx="68" cy="28" r="6" fill="#22c55e" />

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- SIDEBAR -->
    <!-- ══════════════════════════════════════════════════════ -->
    <g transform="translate(0, 60)">
      <line x1="240" y1="0" x2="240" y2="760" stroke="#222222" stroke-width="1" />
      
      <!-- Brand -->
      <text x="28" y="30" font-size="20" class="font-black">ai-checkpoint</text>
      
      <!-- Active Tag -->
      <rect x="28" y="44" width="60" height="20" rx="10" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.3" />
      <circle cx="40" cy="54" r="4" fill="#22c55e" filter="url(#glow)" />
      <text x="50" y="58" font-size="10" class="font-bold text-success">ACTIVE</text>

      <!-- Nav Items -->
      <g transform="translate(20, 100)">
        <text x="12" y="0" font-size="11" class="font-bold text-muted" letter-spacing="1">WORKSPACE</text>
        
        <!-- Active Nav -->
        <rect x="0" y="16" width="200" height="40" rx="8" fill="url(#primaryGlow)" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3" />
        <rect x="0" y="24" width="4" height="24" rx="2" fill="#8b5cf6" filter="url(#glow)" />
        <text x="20" y="41" font-size="14" class="font-bold text-primary">Overview</text>
        
        <text x="20" y="81" font-size="14" class="font-bold text-muted">Plan Viewer</text>
        <text x="20" y="121" font-size="14" class="font-bold text-muted">Rules &amp; Config</text>
        
        <text x="12" y="180" font-size="11" class="font-bold text-muted" letter-spacing="1">LOGS</text>
        <text x="20" y="211" font-size="14" class="font-bold text-muted">CLI Output</text>
        <text x="20" y="251" font-size="14" class="font-bold text-muted">Commit History</text>
      </g>
    </g>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- MAIN CONTENT AREA -->
    <!-- ══════════════════════════════════════════════════════ -->
    <g transform="translate(240, 60)">
      
      <!-- TOP BAR -->
      <g transform="translate(40, 20)">
        <text y="14" font-size="28" class="font-bold">Project Overview</text>
        <text y="38" font-size="14" class="text-muted">Currently executing phase 1 of your master plan.</text>
        
        <!-- Progress Bar Global -->
        <rect x="680" y="10" width="340" height="20" rx="10" fill="#111111" stroke="#222222" />
        <rect x="680" y="10" width="255" height="20" rx="10" fill="url(#primaryGlow)" filter="url(#glow)" />
        <!-- Sharp overlay for the bar itself to keep it crisp -->
        <rect x="680" y="10" width="255" height="20" rx="10" fill="url(#primaryGlow)" />
        <text x="1040" y="25" font-size="14" class="font-bold text-primary">75%</text>
      </g>

      <!-- 3 STATS CARDS -->
      <g transform="translate(40, 90)">
        <!-- Card 1 -->
        <g>
          <rect width="320" height="120" rx="16" fill="url(#panelBg)" stroke="#222222" />
          <text x="24" y="36" font-size="13" class="text-muted">Total Steps</text>
          <text x="24" y="78" font-size="36" class="font-black">24 <tspan font-size="20" class="text-muted">/ 32</tspan></text>
          <text x="24" y="100" font-size="12" class="text-success">+2 completed this session</text>
        </g>
        
        <!-- Card 2 -->
        <g transform="translate(340, 0)">
          <rect width="320" height="120" rx="16" fill="url(#panelBg)" stroke="#222222" />
          <text x="24" y="36" font-size="13" class="text-muted">Current Target File</text>
          <text x="24" y="76" font-size="22" class="font-mono text-primary">auth_service.ts</text>
          <text x="24" y="100" font-size="12" class="text-muted">Step 1.2 — Add Auth Hooks</text>
        </g>

        <!-- Card 3 -->
        <g transform="translate(680, 0)">
          <rect width="320" height="120" rx="16" fill="url(#panelBg)" stroke="#222222" />
          <text x="24" y="36" font-size="13" class="text-muted">AI Model Status</text>
          <text x="24" y="78" font-size="36" class="font-black">Running</text>
          <text x="24" y="100" font-size="12" class="text-primary">Executing Step 1.3...</text>
        </g>
      </g>

      <!-- MAIN BOTTOM AREA -->
      <g transform="translate(40, 240)">
        
        <!-- LEFT: TERMINAL VIEW -->
        <g>
          <rect width="660" height="480" rx="16" fill="#050505" stroke="#222222" />
          <!-- Terminal Header -->
          <rect width="660" height="48" fill="#0a0a0a" stroke="#222222" rx="16" />
          <!-- Flattened bottom for header -->
          <rect width="660" height="10" y="38" fill="#0a0a0a" />
          <line x1="0" y1="48" x2="660" y2="48" stroke="#222222" stroke-width="1" />
          
          <text x="24" y="30" font-size="13" class="font-mono text-muted">~/.agents/scripts/ledger.cjs</text>
          
          <g transform="translate(24, 80)" class="font-mono" font-size="13">
            <text y="0" fill="#a1a1aa">$ ./l start 1.2</text>
            
            <text y="30" fill="#3b82f6">[SYSTEM]</text>
            <text x="75" y="30" fill="#d4d4d8">Creating file: src/auth_service.ts</text>
            
            <text y="54" fill="#3b82f6">[SYSTEM]</text>
            <text x="75" y="54" fill="#d4d4d8">Marking step 1.2 as [RUNNING]</text>

            <text y="94" fill="#a1a1aa">$ ./l c 1.2 "Added Auth0 integration"</text>
            
            <text y="124" fill="#10b981">✓</text>
            <text x="20" y="124" fill="#d4d4d8">File exists: src/auth_service.ts</text>
            
            <text y="148" fill="#10b981">✓</text>
            <text x="20" y="148" fill="#d4d4d8">File is not empty (450 bytes)</text>
            
            <line x1="0" y1="174" x2="612" y2="174" stroke="#222222" />
            
            <text y="200" fill="#22c55e" class="font-bold">✅ Step 1.2 Complete — "Add Auth Hooks"</text>
            <text y="224" fill="#d4d4d8">📊 Progress: 24/32 steps (75%)</text>
            <text y="248" fill="#8b5cf6">👉 Next: Step 1.3 — "Build Profile UI"</text>

            <text y="288" fill="#a1a1aa">$ ./l start 1.3</text>
            <text y="318" fill="#3b82f6">[SYSTEM]</text>
            <text x="75" y="318" fill="#d4d4d8">Creating file: src/profile_ui.tsx</text>

            <!-- Cursor block -->
            <rect x="0" y="340" width="10" height="16" fill="#ffffff" />
          </g>
        </g>

        <!-- RIGHT: STEP TRACKER -->
        <g transform="translate(680, 0)">
          <rect width="320" height="480" rx="16" fill="url(#panelBg)" stroke="#222222" />
          <text x="24" y="36" font-size="16" class="font-bold">Execution Plan</text>
          <line x1="0" y1="50" x2="320" y2="50" stroke="#222222" />
          
          <g transform="translate(24, 75)">
            <!-- Done Step -->
            <circle cx="12" cy="12" r="10" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="1.5" />
            <path d="M 7 12 L 10 15 L 17 8" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <line x1="12" y1="26" x2="12" y2="44" stroke="#333333" stroke-width="2" />
            <text x="36" y="17" font-size="14" class="text-muted" text-decoration="line-through">Step 1.1: Setup DB</text>
            
            <!-- Done Step -->
            <g transform="translate(0, 48)">
              <circle cx="12" cy="12" r="10" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="1.5" />
              <path d="M 7 12 L 10 15 L 17 8" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <line x1="12" y1="26" x2="12" y2="44" stroke="#333333" stroke-width="2" />
              <text x="36" y="17" font-size="14" class="text-muted" text-decoration="line-through">Step 1.2: Add Auth Hooks</text>
            </g>

            <!-- Active Step -->
            <g transform="translate(0, 96)">
              <!-- Ring highlight -->
              <circle cx="12" cy="12" r="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow)" />
              <circle cx="12" cy="12" r="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" />
              <circle cx="12" cy="12" r="4" fill="#8b5cf6" />
              
              <line x1="12" y1="28" x2="12" y2="46" stroke="#333333" stroke-width="2" stroke-dasharray="4" />
              
              <text x="36" y="17" font-size="15" class="font-bold text-primary">Step 1.3: Build Profile UI</text>
              
              <rect x="36" y="24" width="56" height="20" rx="6" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" />
              <text x="44" y="38" font-size="10" class="font-bold text-primary">RUNNING</text>
            </g>

            <!-- Pending Step -->
            <g transform="translate(0, 148)">
              <circle cx="12" cy="12" r="9" fill="none" stroke="#444444" stroke-width="1.5" />
              <line x1="12" y1="26" x2="12" y2="44" stroke="#333333" stroke-width="2" stroke-dasharray="4" />
              <text x="36" y="17" font-size="14" class="text-muted">Step 1.4: API Routes</text>
            </g>

            <!-- Pending Step -->
            <g transform="translate(0, 196)">
              <circle cx="12" cy="12" r="9" fill="none" stroke="#444444" stroke-width="1.5" />
              <text x="36" y="17" font-size="14" class="text-muted">Step 2.1: Gateway</text>
            </g>
          </g>
        </g>
        
      </g>
    </g>
  </g>
</svg>
